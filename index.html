<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎈 小熊猫闯迷宫 ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #FFF5E6 0%, #FFE0B2 100%);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #gameContainer {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .screen {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .hidden {
            display: none !important;
        }
        #startScreen h1 {
            font-size: 2.5rem;
            color: #FF6B9D;
            text-shadow: 3px 3px 0 #FF9F43;
            animation: bounce 0.6s ease-in-out infinite alternate;
            text-align: center;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
        #startScreen p {
            font-size: 1.2rem;
            color: #5D4037;
            margin: 20px 0 30px;
            text-align: center;
        }
        .btn {
            background: linear-gradient(135deg, #FF6B9D 0%, #FF9F43 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #D85A7D;
            transition: all 0.1s;
            font-family: inherit;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #D85A7D;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #D85A7D;
        }
        #topBar {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #5D4037;
            font-weight: bold;
        }
        #gameCanvas {
            border: 5px solid #8D6E63;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: #98D8C8;
        }
        #controls {
            margin-top: 20px;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 10px;
        }
        .arrow-btn {
            width: 70px;
            height: 70px;
            font-size: 2rem;
            background: white;
            border: 3px solid #FF6B9D;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #D85A7D;
            user-select: none;
        }
        .arrow-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #D85A7D;
        }
        .arrow-btn.up { grid-area: up; }
        .arrow-btn.down { grid-area: down; }
        .arrow-btn.left { grid-area: left; }
        .arrow-btn.right { grid-area: right; }
        #restartBtn {
            margin-top: 15px;
            padding: 10px 25px;
            font-size: 1rem;
        }
        #countdownScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #countdown {
            font-size: 8rem;
            color: #FFD700;
            text-shadow: 0 0 30px #FFD700;
        }
        #levelText {
            font-size: 2rem;
            color: white;
            margin-bottom: 20px;
        }
        #victoryScreen h1 {
            font-size: 3rem;
            color: #FF6B9D;
            animation: spin 0.5s ease-in-out;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #victoryScreen p {
            font-size: 1.3rem;
            color: #5D4037;
            margin: 15px 0;
        }
        #caughtScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(139, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 150;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        #caughtScreen h1 {
            font-size: 4rem;
            color: #FFD700;
            text-shadow: 3px 3px 0 #000;
        }
        .danger-pulse {
            animation: dangerPulse 0.3s ease-in-out infinite;
        }
        @keyframes dangerPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @media (min-width: 768px) {
            #controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="startScreen" class="screen">
            <h1>🎈 小熊猫闯迷宫 ✨</h1>
            <p>小心恶狼！它在3秒后就会出来追你啦🐺</p>
            <button class="btn" id="startBtn">🌈 开始冒险</button>
        </div>
        <div id="gameScreen" class="screen hidden">
            <div id="topBar">
                <span id="levelDisplay">关卡 1/15</span>
                <span id="timerDisplay">⏱️ 00:00</span>
                <span id="stepsDisplay">👣 步数: 0</span>
                <span id="wolfDisplay">🐺 准备中...</span>
            </div>
            <canvas id="gameCanvas"></canvas>
            <div id="controls">
                <button class="arrow-btn up" data-dir="up">⬆️</button>
                <button class="arrow-btn left" data-dir="left">⬅️</button>
                <button class="arrow-btn right" data-dir="right">➡️</button>
                <button class="arrow-btn down" data-dir="down">⬇️</button>
            </div>
            <button class="btn" id="restartBtn">🔄 重新开始本关</button>
        </div>
        <div id="countdownScreen" class="screen hidden">
            <div id="levelText"></div>
            <div id="countdown"></div>
        </div>
        <div id="victoryScreen" class="screen hidden">
            <h1>🎉 恭喜通关！</h1>
            <p id="victoryStats"></p>
            <p id="totalStats" class="hidden"></p>
            <button class="btn" id="nextBtn">下一关</button>
        </div>
        <div id="caughtScreen" class="screen hidden">
            <h1>被恶狼抓到了！🐺</h1>
            <button class="btn" id="retryBtn">💪 再试一次</button>
        </div>
    </div>

            function handleKeyDown(e) {

                else if (key === 'ArrowLeft' || key === 'a' || key === 'A') movePlayer(-1, 0, 'left');

                    (secs < 10 ? '0' + secs : secs);

            function bfs(startX, startY, endX, endY, maze) {
                var queue = [[startX, startY]];
                var visited = {};
                var parent = {};
                var key = startX + ',' + startY;
                visited[key] = true;
                var dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
                while (queue.length > 0) {
                    var current = queue.shift();
                    var cx = current[0];
                    var cy = current[1];
                    if (cx === endX && cy === endY) {
                        var path = [];
                        var currKey = cx + ',' + cy;
                        while (parent[currKey]) {
                            var parts = currKey.split(',');
                            path.unshift([parseInt(parts[0]), parseInt(parts[1])]);
                            currKey = parent[currKey];
                        }
                        return path;
                    }
                    for (var i = 0; i < dirs.length; i++) {
                        var nx = cx + dirs[i][0];
                        var ny = cy + dirs[i][1];
                        var nKey = nx + ',' + ny;
                        if (nx >= 0 && nx < maze[0].length && 
                            ny >= 0 && ny < maze.length && 
                            maze[ny][nx] !== 1 && 
                            !visited[nKey]) {

                            queue.push([nx, ny]);

                    newY >= 0 && newY < maze.length && 
                    maze[newY][newX] !== 1) {

                    playerY = newY;

            function addSparkles() {

                        y: playerY * CELL_SIZE + CELL_SIZE / 2,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,

            function createConfetti() {
                var colors = ['#FF0000', '#FF8000', '#FFFF00', '#00FF00', '#0080FF', '#4000FF', '#8000FF'];
                for (var i = 0; i < 100; i++) {
                    confettiParticles.push({
                        x: Math.random() * canvas.width,
                        y: -20 - Math.random() * 100,
                        vx: (Math.random() - 0.5) * 3,
                        vy: 2 + Math.random() * 3,

            function playMoveSound() {
                if (!audioContext) return;
                var osc = audioContext.createOscillator();
                var gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = 600;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.1, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                osc.start();
                osc.stop(audioContext.currentTime + 0.1);
            }
            function playWallSound() {
                if (!audioContext) return;
                var osc = audioContext.createOscillator();
                var gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = 150;
                osc.type = 'square';
                gain.gain.setValueAtTime(0.1, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                osc.start();
                osc.stop(audioContext.currentTime + 0.15);
            }
            function playVictorySound() {
                if (!audioContext) return;
                var notes = [523.25, 659.25, 783.99, 1046.50];
                for (var i = 0; i < notes.length; i++) {
                    (function(n) {
                        setTimeout(function() {
                            var osc = audioContext.createOscillator();

                            osc.connect(gain);

                            osc.type = 'sine';

                }
            }
            function playCaughtSound() {
                if (!audioContext) return;
                var notes = [300, 250, 200, 150];
                for (var i = 0; i < notes.length; i++) {
                    (function(n) {
                        setTimeout(function() {
                            var osc = audioContext.createOscillator();
                            var gain = audioContext.createGain();
                            osc.connect(gain);
                            gain.connect(audioContext.destination);

                            osc.type = 'sawtooth';
                            gain.gain.setValueAtTime(0.3, audioContext.currentTime);

            function gameLoop() {
                if (elements.gameScreen.classList.contains('hidden') &&

                update();

            function update() {
                glowPhase += 0.05;
                pandaWobble += 0.1;
                if (pandaWalking) {
                    walkPhase += 0.3;
                    if (walkPhase > Math.PI * 2) {
                        walkPhase = 0;
                        pandaWalking = false;
                    }

                if (bounceBack > 0) {
                    bounceBack -= 0.1;

                for (var i = sparkleParticles.length - 1; i >= 0; i--) {
                    var s = sparkleParticles[i];
                    s.x += s.vx;
                    s.y += s.vy;
                    s.life--;
                    if (s.life <= 0) {
                        sparkleParticles.splice(i, 1);
                    }

                for (var i = 0; i < confettiParticles.length; i++) {
                    var c = confettiParticles[i];
                    c.x += c.vx;
                    c.y += c.vy;
                    c.vy += 0.1;
                    c.rot += c.rotSpeed;

                if (wolfActive) {
                    wolfProgress += WOLF_SPEED * 0.02;
                    if (wolfProgress >= 1) {
                        wolfProgress = 0;
                        wolfX = wolfTargetX;
                        wolfY = wolfTargetY;
                        var maze = mazes[currentLevel];
                        var path = bfs(wolfX, wolfY, playerX, playerY, maze);
                        if (path.length > 0) {
                            wolfTargetX = path[0][0];
                            wolfTargetY = path[0][1];
                        }
                    }
                    var currentWolfX = wolfX + (wolfTargetX - wolfX) * wolfProgress;
                    var currentWolfY = wolfY + (wolfTargetY - wolfY) * wolfProgress;
                    if (Math.abs(playerX - currentWolfX) < 0.8 && Math.abs(playerY - currentWolfY) < 0.8) {
                        dangerMode = true;
                        showCaught();
                    }
                }
            }
            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                var maze = mazes[currentLevel];
                if (dangerMode) {
                    ctx.fillStyle = 'rgba(139, 0, 0, 0.3)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                for (var y = 0; y < maze.length; y++) {
                    for (var x = 0; x < maze[y].length; x++) {
                        var cell = maze[y][x];
                        var px = x * CELL_SIZE;
                        var py = y * CELL_SIZE;
                        if (cell === 0) {
                            ctx.fillStyle = PATH_COLOR;
                            ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
                        } else if (cell === 1) {
                            ctx.fillStyle = WALL_COLOR;
                            ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
                            ctx.fillStyle = '#2E8B2E';
                            for (var i = 0; i < 3; i++) {
                                var bpx = px + 10 + i * 15;
                                var bpy = py + 10;
                                ctx.fillRect(bpx, bpy, 4, CELL_SIZE - 20);
                            }
                        } else if (cell === 2) {
                            ctx.fillStyle = PATH_COLOR;
                            ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
                            var glow = Math.sin(glowPhase) * 10 + 15;
                            ctx.shadowColor = EXIT_COLOR;
                            ctx.shadowBlur = glow;
                            ctx.fillStyle = EXIT_COLOR;
                            ctx.beginPath();
                            ctx.arc(px + CELL_SIZE/2, py + CELL_SIZE/2, CELL_SIZE/3, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }
                    }
                }
                for (var i = 0; i < sparkleParticles.length; i++) {
                    var s = sparkleParticles[i];
                    ctx.fillStyle = 'rgba(255, 215, 0, ' + (s.life / 30) + ')';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 3, 0, Math.PI * 2);

                    var currentWolfX = wolfX + (wolfTargetX - wolfX) * wolfProgress;
                    var currentWolfY = wolfY + (wolfTargetY - wolfY) * wolfProgress;
                    drawWolf(currentWolfX, currentWolfY);

                for (var i = 0; i < confettiParticles.length; i++) {

            function drawWolf(wx, wy) {
                var cx = wx * CELL_SIZE + CELL_SIZE / 2;
                var cy = wy * CELL_SIZE + CELL_SIZE / 2;
                var wobble = Math.sin(glowPhase * 2) * 2;
                ctx.save();
                ctx.translate(cx + wobble, cy);
                var bodySize = CELL_SIZE * 0.38;
                ctx.fillStyle = '#666666';
                ctx.beginPath();
                ctx.ellipse(0, 5, bodySize, bodySize * 0.75, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = '#555555';
                ctx.beginPath();
                ctx.ellipse(-bodySize * 0.5, 12, 7, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(bodySize * 0.5, 12, 7, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                var headSize = CELL_SIZE * 0.32;
                ctx.fillStyle = '#777777';
                ctx.beginPath();
                ctx.ellipse(0, -headSize * 0.3, headSize, headSize * 0.9, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = '#555555';
                ctx.beginPath();
                ctx.moveTo(-headSize * 0.5, -headSize * 0.8);
                ctx.lineTo(-headSize * 0.8, -headSize * 1.4);
                ctx.lineTo(-headSize * 0.2, -headSize * 1);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(headSize * 0.5, -headSize * 0.8);
                ctx.lineTo(headSize * 0.8, -headSize * 1.4);
                ctx.lineTo(headSize * 0.2, -headSize * 1);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                var eyeY = -headSize * 0.4;
                ctx.fillStyle = '#FF0000';
                ctx.shadowColor = '#FF0000';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(-headSize * 0.3, eyeY, headSize * 0.12, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(headSize * 0.3, eyeY, headSize * 0.12, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(-headSize * 0.3, eyeY, headSize * 0.06, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(headSize * 0.3, eyeY, headSize * 0.06, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(-headSize * 0.5, eyeY - headSize * 0.15);
                ctx.lineTo(-headSize * 0.1, eyeY - headSize * 0.25);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(headSize * 0.5, eyeY - headSize * 0.15);
                ctx.lineTo(headSize * 0.1, eyeY - headSize * 0.25);
                ctx.stroke();
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.ellipse(0, eyeY + headSize * 0.3, headSize * 0.12, headSize * 0.08, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, eyeY + headSize * 0.4);
                ctx.quadraticCurveTo(-headSize * 0.2, eyeY + headSize * 0.6, -headSize * 0.3, eyeY + headSize * 0.55);
                ctx.moveTo(0, eyeY + headSize * 0.4);
                ctx.quadraticCurveTo(headSize * 0.2, eyeY + headSize * 0.6, headSize * 0.3, eyeY + headSize * 0.55);
                ctx.stroke();
                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.moveTo(-headSize * 0.25, eyeY + headSize * 0.55);
                ctx.lineTo(-headSize * 0.2, eyeY + headSize * 0.75);
                ctx.lineTo(-headSize * 0.15, eyeY + headSize * 0.55);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(headSize * 0.25, eyeY + headSize * 0.55);
                ctx.lineTo(headSize * 0.2, eyeY + headSize * 0.75);
                ctx.lineTo(headSize * 0.15, eyeY + headSize * 0.55);
                ctx.fill();
                ctx.restore();
            }
            function drawPanda() {
                var cx = playerX * CELL_SIZE + CELL_SIZE / 2;
                var cy = playerY * CELL_SIZE + CELL_SIZE / 2;
                var wobble = Math.sin(pandaWobble) * 2;
                var bounce = pandaWalking ? Math.sin(walkPhase) * 3 : 0;
                if (bounceBack > 0) {
                    if (bounceDir === 'left') cx += bounceBack * 8;
                    else if (bounceDir === 'right') cx -= bounceBack * 8;
                    else if (bounceDir === 'up') cy += bounceBack * 8;
                    else if (bounceDir === 'down') cy -= bounceBack * 8;
                }
                ctx.save();
                ctx.translate(cx + wobble, cy - bounce);
